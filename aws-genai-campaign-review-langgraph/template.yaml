AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Unified Campaign Review System - Agent API + Frontend

Globals:
  Function:
    Timeout: 300
    MemorySize: 1024
  Api:
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"

Resources:
  # Unified S3 Bucket for all content
  UnifiedBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Frontend S3 Bucket
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  # Origin Access Control for CloudFront
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
        Enabled: true
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  # S3 Bucket Policy for CloudFront OAC
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # HTTP API Gateway for frontend functions
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        MaxAge: 600

  # Agent Observability Log Group
  AgentLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: agents/campaign-review-logs
      RetentionInDays: 365

  # Agent Observability Log Stream
  AgentLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref AgentLogGroup
      LogStreamName: default

  # Dependencies Layer for Orchestrator
  OrchestratorDepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: orchestrator-deps
      ContentUri: lambda/layer/
      CompatibleRuntimes:
        - python3.12
    Metadata:
      BuildMethod: python3.12

  # Campaign Orchestrator Lambda
  CampaignOrchestratorLanggraphFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: campaign-orch-langgraph
      CodeUri: lambda/
      Handler: orchestrator.lambda_handler
      Runtime: python3.12
      Timeout: 600
      Layers:
        - !Ref OrchestratorDepsLayer
      Tracing: Active
      Environment:
        Variables:
          CAMPAIGN_BUCKET: !Ref UnifiedBucket
          AGENT_OBSERVABILITY_ENABLED: "true"
          LANGSMITH_OTEL_ENABLED: "true"
          OTEL_PYTHON_DISTRO: "aws_distro"
          OTEL_PYTHON_CONFIGURATOR: "aws_configurator"
          OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
          OTEL_TRACES_EXPORTER: "otlp"
          OTEL_EXPORTER_OTLP_LOGS_HEADERS: "x-aws-log-group=agents/campaign-review-logs,x-aws-log-stream=default,x-aws-metric-namespace=bedrock-agentcore"
          OTEL_RESOURCE_ATTRIBUTES: "service.name=campaign-review-orchestrator"
          OTEL_PROPAGATORS: "tracecontext,baggage,xray"
          OTEL_PYTHON_LOG_CORRELATION: "true"
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /review-campaign
            Method: post
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: "*"
            - Effect: Allow
              Action:
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !GetAtt AgentLogGroup.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
                - s3:ListBucket
              Resource: 
                - !Sub "arn:aws:s3:::${UnifiedBucket}/*"
                - !GetAtt UnifiedBucket.Arn
  
  # Upload Lambda Function
  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/upload/
      Handler: index.handler
      Runtime: nodejs20.x
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          S3_BUCKET: !Ref UnifiedBucket
          S3_REGION: !Ref AWS::Region
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref UnifiedBucket
      Events:
        Upload:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /upload
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        EntryPoints: 
          - index.js

  # Reviews Lambda Function
  ReviewsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/reviews/
      Handler: index.handler
      Runtime: nodejs20.x
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          S3_BUCKET: !Ref UnifiedBucket
          S3_REGION: !Ref AWS::Region
      Policies:
        - Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${UnifiedBucket}'
              - !Sub 'arn:aws:s3:::${UnifiedBucket}/*'
      Events:
        GetReviews:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /reviews
            Method: GET

  # Health Check Lambda Function
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/health/
      Handler: index.handler
      Runtime: nodejs20.x
      MemorySize: 512
      Timeout: 30
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /health
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Format: esm
        EntryPoints: 
          - index.mjs

Outputs:
  CampaignOrchestratorApi:
    Description: "API Gateway endpoint URL for Campaign Orchestrator function"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/review-campaign/"
  ApiEndpoint:
    Description: "HTTP API Gateway endpoint URL"
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  CloudFrontURL:
    Description: "CloudFront Distribution URL"
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  FrontendBucket:
    Description: "S3 Bucket for Frontend"
    Value: !Ref FrontendBucket
  UnifiedBucket:
    Description: "Unified S3 Bucket for Campaign Data and Reviews"
    Value: !Ref UnifiedBucket
